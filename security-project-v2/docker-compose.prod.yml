version: '3.8'

# ============================================================
# docker-compose.prod.yml — Configuration Production SecLab
# Usage : docker compose -f docker-compose.prod.yml up -d
# ============================================================

services:
  mysql:
    image: mysql:8.0
    container_name: seclab-mysql-prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    volumes:
      - mysql_data_prod:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./database/mysql.conf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - seclab-internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    # Pas de port exposé en production — accessible uniquement en interne
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    image: seclab-backend:prod
    container_name: seclab-backend-prod
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV:           production
      MYSQL_HOST:         mysql
      MYSQL_PORT:         3306
      MYSQL_DATABASE:     ${MYSQL_DATABASE}
      MYSQL_USER:         ${MYSQL_USER}
      MYSQL_PASSWORD:     ${MYSQL_PASSWORD}
      JWT_SECRET:         ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGIN:        ${CORS_ORIGIN}
      PORT:               3001
    networks:
      - seclab-internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: seclab-frontend:prod
    container_name: seclab-frontend-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - seclab-internal
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  mysql_data_prod:
    name: seclab_mysql_prod
    driver: local

networks:
  seclab-internal:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.20.0.0/24
