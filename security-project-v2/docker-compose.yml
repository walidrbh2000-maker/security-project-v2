version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: seclab-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    networks:
      - seclab-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seclab-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV:        ${NODE_ENV:-development}
      MYSQL_HOST:      mysql
      MYSQL_PORT:      3306
      MYSQL_DATABASE:  ${MYSQL_DATABASE}
      MYSQL_USER:      ${MYSQL_USER}
      MYSQL_PASSWORD:  ${MYSQL_PASSWORD}
      JWT_SECRET:      ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_SECRET}_refresh
      CORS_ORIGIN:     ${CORS_ORIGIN:-http://localhost}
      PORT:            3001
    networks:
      - seclab-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: seclab-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - seclab-net

volumes:
  mysql_data:

networks:
  seclab-net:
    driver: bridge
